[provider]
default = "openai"
model = "gpt-5.4"
timeout_seconds = 30

[provider.openai]
base_url = "https://api.openai.com/v1"

[models]
main = ["gpt-5.4"]
fast = ["gpt-5.4-mini"]
coding = ["gpt-5.3-codex"]

[execution]
mode = "prefill" # prefill | confirm | autorun

[capture]
mode = "raw" # vt100 = full terminal parser (can panic on dumb/IDE PTYs)
alt_screen = "drop" # drop | snapshot | capture

[mcp.servers.exa]
transport = "http"
url = "https://mcp.exa.ai/mcp"

[mcp.servers."gh-grep"]
transport = "http"
url = "https://mcp.grep.app"
