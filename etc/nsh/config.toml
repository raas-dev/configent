[provider]
default = "zai"
model = "glm-5.1"
timeout_seconds = 30

[provider.zai]
base_url = "https://api.z.ai/api/coding/paas/v4"
api_key_cmd = "printenv ZAI_API_KEY"

[models]
main = ["glm-5.1"]
fast = ["glm-5-turbo"]
coding = ["glm-5.1"]

[execution]
mode = "prefill" # prefill | confirm | autorun

[mcp.servers.exa]
transport = "http"
url = "https://mcp.exa.ai/mcp"

[mcp.servers."gh-grep"]
transport = "http"
url = "https://mcp.grep.app"
