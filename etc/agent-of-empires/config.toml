default_profile = ""

[theme]
name = "phosphor"
color_mode = "truecolor"

[session]
default_tool = "pi"
yolo_mode_default = true
agent_status_hooks = true
strict_hotkeys = false

[worktree]
enabled = false
path_template = "../{repo-name}-worktrees/{branch}"
bare_repo_path_template = "./{branch}"
auto_cleanup = true
show_branch_in_tui = true
delete_branch_on_cleanup = true

[sandbox]
enabled_by_default = false
default_image = "ghcr.io/njbrake/aoe-sandbox:latest"
extra_volumes = []
environment = ["TERM", "COLORTERM", "FORCE_COLOR", "NO_COLOR"]
auto_cleanup = true
volume_ignores = []
default_terminal_mode = "host"

[tmux]
status_bar = "auto"
mouse = "auto"

[diff]
context_lines = 3

[updates]
check_enabled = false
auto_update = false
check_interval_hours = 24
notify_in_cli = false

[sound]
enabled = false

[app_state]
has_seen_welcome = true
last_seen_version = "1.5.0"
has_seen_custom_instruction_warning = false
has_acknowledged_agent_hooks = false
sort_order = "oldest"

[web]
notifications_enabled = true
notify_on_waiting = true
notify_on_idle = false
notify_on_error = true
