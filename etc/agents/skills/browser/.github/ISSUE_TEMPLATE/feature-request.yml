name: Feature request
description: Propose a new feature or change.
labels: [feature-request]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is a feature request, not a bug.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or limitation motivates this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else you tried, or why other approaches fall short.
    validations:
      required: true
