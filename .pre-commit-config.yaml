# Install the hooks in this file:
#   prek install --hook-type pre-commit --hook-type commit-msg
#
# (optional) test hooks for staged files:
#   prek run --verbose
#
# (optional) test hooks for all files:
#   prek run --all-files --verbose

default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        files: ^(?!.*skills/).*$
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: end-of-file-fixer
        files: ^(?!etc/nvim/lazyvim\.json$|etc/claude-code/hooks/.*\.sha256$|etc/pi/settings\.json$).*
      - id: trailing-whitespace
      - id: check-json
        files: ^(?!.*skills/).*$
      - id: check-toml
      - id: check-yaml
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
        files: ^(?!.*skills/).*$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
        files: ^(?!.*skills/|etc/claude-code/hooks/).*$
      - id: shfmt
        files: ^(?!.*etc/claude-code/hooks/).*$

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        files: ^(?!.*skills/).*$

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
        stages: [commit-msg]
